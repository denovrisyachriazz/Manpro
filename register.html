<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lapor Bantu - Registrasi Akun Warga</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="./assets/css/style.css">
  </head>
  <body>
    <div class="auth-wrapper flex-column justify-content-between">
      <div></div>

      <div class="card card-custom auth-card my-4">
        <a href="index.html" class="auth-logo">
          <i class="bi bi-activity text-primary"></i>
          <span>Lapor Bantu</span>
        </a>
        <p class="auth-subtitle text-center">
          Pendaftaran Akun Sistem Pelaporan Bantuan Sosial
        </p>

        <h4 class="auth-title">Daftar Akun Baru</h4>

        <form id="registerForm">
          <!-- Nama Lengkap -->
          <div class="mb-3">
            <label for="regNama" class="form-label fw-medium">Nama Lengkap</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" id="regNama" class="form-control" placeholder="Masukkan nama lengkap" required>
            </div>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label for="regEmail" class="form-label fw-medium">Alamat Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="regEmail" class="form-control" placeholder="contoh@email.com" required>
            </div>
          </div>

          <!-- No HP -->
          <div class="mb-3">
            <label for="regHp" class="form-label fw-medium">Nomor Handphone</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-telephone"></i></span>
              <input type="tel" id="regHp" class="form-control" placeholder="0812xxxxxx" required>
            </div>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label for="regPassword" class="form-label fw-medium">Kata Sandi (Password)</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="regPassword" class="form-control" placeholder="Kata sandi minimal 6 karakter" required>
            </div>
          </div>

          <!-- Konfirmasi Password -->
          <div class="mb-4">
            <label for="regConfirm" class="form-label fw-medium">Konfirmasi Kata Sandi</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
              <input type="password" id="regConfirm" class="form-control" placeholder="Ulangi kata sandi" required>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary w-100 py-2.5 mb-3">Daftar Sekarang</button>
        </form>

        <div class="text-center mt-3">
          <span class="text-gray" style="font-size: 0.85rem;">Sudah memiliki akun?</span>
          <a href="index.html" class="text-primary text-decoration-none fw-semibold ms-1" style="font-size: 0.85rem;">Masuk ke Akun</a>
        </div>
      </div>

      <div class="footer-text py-3">
        © 2026 Lapor Bantu • Pusat Bantuan • Kebijakan Privasi
      </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core Script -->
    <script src="./assets/js/script.js"></script>
  </body>
</html>
