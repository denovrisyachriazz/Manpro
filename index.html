<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lapor Bantu - Masuk ke Akun Anda</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="./assets/css/style.css">
  </head>
  <body>
    <div class="auth-wrapper flex-column justify-content-between">
      <div></div> <!-- Spacer -->

      <div class="card card-custom auth-card">
        <a href="index.html" class="auth-logo">
          <i class="bi bi-activity text-primary"></i>
          <span>Lapor Bantu</span>
        </a>
        <p class="auth-subtitle text-center">
          Platform Pelaporan dan Tracking Bantuan Sosial Masyarakat
        </p>

        <h4 class="auth-title">Masuk ke Akun Anda</h4>

        <form id="loginForm">
          <!-- Email / Username -->
          <div class="mb-3">
            <label for="emailInput" class="form-label fw-medium">Email atau Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" id="emailInput" class="form-control" placeholder="Masukkan email atau username" value="denovri@gmail.com" required>
            </div>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label for="passwordInput" class="form-label fw-medium">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="passwordInput" class="form-control" placeholder="Masukkan password" value="password123" required>
              <button class="btn btn-light border-start-0" type="button" style="border: 1px solid var(--border-color); border-radius: 0 10px 10px 0 !important;" onclick="const p = document.getElementById('passwordInput'); p.type = p.type === 'password' ? 'text' : 'password'"><i class="bi bi-eye"></i></button>
            </div>
          </div>

          <!-- Remember me & Forgot Pass -->
          <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMeCheckbox" checked>
              <label class="form-check-label text-gray" for="rememberMeCheckbox" style="font-size: 0.85rem;">
                Ingat saya
              </label>
            </div>
            <a href="#" onclick="alert('Reset Password: Instruksi pemulihan sandi telah dikirim ke email Anda.')" class="text-primary text-decoration-none" style="font-size: 0.85rem; font-weight: 500;">Lupa password?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary w-100 py-2.5 mb-3">Login</button>
        </form>

        <!-- Dynamic Bypass/Demonstration Actions -->
        <div class="border-top pt-3 mt-2 text-center">
          <p class="text-muted mb-2" style="font-size: 0.8rem;">Pilihan Akses Demo (Instan):</p>
          <div class="d-flex gap-2 justify-content-center">
            <button id="bypassMasyarakat" class="btn btn-sm btn-outline-primary py-1 px-3">
              <i class="bi bi-people me-1"></i> Demo Warga
            </button>
            <button id="bypassAdmin" class="btn btn-sm btn-outline-success py-1 px-3 text-success">
              <i class="bi bi-shield-lock me-1"></i> Demo Admin
            </button>
          </div>
        </div>

        <div class="text-center mt-4">
          <span class="text-gray" style="font-size: 0.85rem;">Belum punya akun?</span>
          <a href="register.html" class="text-primary text-decoration-none fw-semibold ms-1" style="font-size: 0.85rem;">Daftar di sini</a>
        </div>
      </div>

      <div class="footer-text py-3">
        © 2026 Lapor Bantu • Pusat Bantuan • Kebijakan Privasi
      </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core Script -->
    <script src="./assets/js/script.js"></script>
  </body>
</html>
